<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabie Marché</title>
    <style>
        body {
            background-color: #007bff; /* اللون الأزرق */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .connect-button {
            position: absolute;
            top: 30px;
            right: 30px;
            /* تكبير الحجم */
            padding: 18px 36px;
            font-size: 20px;
            font-weight: bold;
            color: #000;
            background-color: #ffc107; /* لون ذهبي */
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0px 6px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s, background-color 0.2s;
        }

        .connect-button:hover {
            background-color: #ffca2c;
            transform: scale(1.05); /* كيكبر شوية ملي كدوز عليه */
        }

        .connect-button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <button class="connect-button" id="connectWallet">Connect Wallet</button>

    <script>
        const connectButton = document.getElementById('connectWallet');

        connectButton.addEventListener('click', async () => {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    // طلب الاتصال بالمحفظة
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const account = accounts[0];
                    connectButton.innerText = "Connected: " + account.substring(0, 6) + "..." + account.substring(account.length - 4);
                    connectButton.style.backgroundColor = "#28a745"; // كيتغير للأخضر ملي كيتكونكتا
                    connectButton.style.color = "#fff";
                    console.log("Connected to account:", account);
                } catch (error) {
                    console.error("User rejected the request", error);
                    alert("رفضتِ الاتصال بالمحفظة!");
                }
            } else {
                // إذا لم يكن MetaMask مثبتاً
                alert("المرجو تثبيت MetaMask أولاً!");
                window.open('https://metamask.io/download/', '_blank');
            }
        });
    </script>

</body>
</html>
