<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Rabie Marché</title>
    <style>
        body {
            background-color: #007bff; /* اللون الأزرق اللي اختارينا */
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        .connect-button {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            background-color: #ffc107; /* لون ذهبي للزرار */
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0px 4px 6px rgba(0,0,0,0.2);
        }

        .connect-button:hover {
            background-color: #e0a800; /* كيتغير اللون شوية ملي كدوز عليه السهم */
        }
    </style>
</head>
<body>

    <button class="connect-button">Connect Wallet</button>

</body>
</html>
